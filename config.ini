model : 'end2end_model/kool2019/pretrained/tsp_20/epoch-99.pt'
standard_cluster_size : 20

scaling_factor : 0.9

# do normalization before clustering operation
# False:  clustering based on original data, do normalization during passing through NN
# True:  clustering based on normalized data
pre_normalization : False

# salesman count (cluster K range)
salesman_count: 10

cluster_algo: 'k-means++'

# search best K in range [k_start, k_end] automatically
# False: do not search, use client specified K(salesman_count)
k_means_auto_k: False



#max_clustering_iter: 100
max_clustering_iter: 300


# parallel clustering cup cores
# -1: use all cores
n_jobs: -1

# algorithm for merging level 2 clusters
level2_tour_merge_algo: 'farthest_insertion'

log_dir : 'tsplib_solving_log/'

# testing TSPLIB_all_symmetric_ecu_2d_tsp dataset
TSP_data_file_path: 'data/tsplib95_all_symmetric_euc_2d_tsp'

max_small_scale: 300
max_medium_scale: 3000

k_list_small_scale: [3,5,8,10]
k_list_medium_scale: [10,15,20,30]
k_list_large_scale: [30,50,80,100]

# log_folder
# log_folder: "log/tsplib95SymmetricEuc2dAll_tsplib95_standard_nint_"+time_stamp
log_folder: 'log/tsplib95SymmetricEuc2dAll_tsplib95_standard_nint'